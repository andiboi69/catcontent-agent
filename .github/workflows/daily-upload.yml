name: Daily Cat Video Upload

on:
  schedule:
    # 4 uploads/day across peak PHT hours. Format chosen by weighted
    # rotation in config.py CONTENT_FORMATS (cat_facts 4x, funny_cat_facts 1x).
    - cron: '0 1 * * *'   # 9:00 AM PHT
    - cron: '0 6 * * *'   # 2:00 PM PHT
    - cron: '0 11 * * *'  # 7:00 PM PHT
    - cron: '0 15 * * *'  # 11:00 PM PHT
  workflow_dispatch:  # Manual trigger button
    inputs:
      format:
        description: 'Content format (leave empty for auto)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to files
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Pick format (manual override only)
        id: pick-format
        run: |
          if [ -n "${{ github.event.inputs.format }}" ]; then
            echo "format=--format ${{ github.event.inputs.format }}" >> $GITHUB_OUTPUT
          else
            echo "format=" >> $GITHUB_OUTPUT
          fi

      - name: Generate and upload video
        run: python agent.py generate ${{ steps.pick-format.outputs.format }} --upload --privacy public

      - name: Save updated token and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_footage.json used_scripts.json used_music.json -f
          git stash
          git pull --rebase
          git stash pop || true
          git add used_footage.json used_scripts.json used_music.json -f
          git diff --cached --quiet || git commit -m "Update history [skip ci]"
          git push
