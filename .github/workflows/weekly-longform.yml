name: Weekly Long-Form Video Upload

on:
  schedule:
    # 2x per week — long-form watch hours are the realistic YPP route
    # (4,000h/365d; Shorts feed watch time does NOT count).
    - cron: '0 9 * * 0'   # Sunday 9:00 UTC
    - cron: '0 9 * * 3'   # Wednesday 9:00 UTC
  workflow_dispatch:  # Manual trigger button

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Long-form needs more time (footage + assembly + upload)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FFmpeg and fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to files
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > youtube_token.json

      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Generate and upload long-form video
        run: python longform_agent.py generate --upload --privacy public

      - name: Save updated token and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_footage.json used_scripts.json used_music.json -f
          git stash
          git pull --rebase
          git stash pop || true
          git add used_footage.json used_scripts.json used_music.json -f
          git diff --cached --quiet || git commit -m "Update history (longform) [skip ci]"
          git push
